# Render Blueprint — AlaraOS STAGING (alarahc.com)
# Place this at your Git repo root (or create the service manually in the Render dashboard
# using the same settings). Paths below assume the repo contains ``.
# If your repo root IS the alaraos folder, drop the `` prefixes.
#
# The server uses only the Python standard library (no dependencies) and binds 0.0.0.0:$PORT.
services:
  - type: web
    name: alaraos-staging
    runtime: python
    plan: starter
    branch: main
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 preview_server.py"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SITE_MODE
        value: staging          # staging => noindex,nofollow + robots Disallow + no sitemap
      - key: PYTHON_VERSION
        value: "3.11.9"
# At launch (production cutover) you would flip SITE_MODE to "production" AND point the
# production domain at this service. Until then, leave SITE_MODE=staging.
